name: FLARE24
full_name: "MICCAI FLARE 2024 / FLARE-MedFM challenge datasets"
homepage: https://flare-medfm.github.io/
license: cc-by-nc-4.0
access: gated
raw_data_dir: data/raw/huggingface
extracted_data_dir: data/raw/extracted
tasks:
  task1:
    name: "Pan-cancer segmentation in CT scans"
    codabench: https://www.codabench.org/competitions/2319/
    huggingface_repo: FLARE-MedFM/FLARE-Task1-Pancancer
    modality: CT
    setting: "partially labeled lesion segmentation plus unlabeled and validation data"
  task2:
    name: "Abdominal CT Organ Segmentation on Laptop"
    codabench: https://www.codabench.org/competitions/2320/
    huggingface_repo: FLARE-MedFM/FLARE-Task2-LaptopSeg
    modality: CT
    setting: "50 ground-truth CT cases, 2000 pseudo-labeled CT cases, 250 validation cases, 50-case coreset"
  task3:
    name: "Unsupervised Domain Adaptation for Abdominal Organ Segmentation in MRI and PET Scans"
    codabench: https://www.codabench.org/competitions/2296/
    huggingface_repo: FLARE-MedFM/FLARE-Task3-DomainAdaption
    modality: "CT, MRI, PET"
    setting: "CT labeled/pseudo-labeled source data with unlabeled MRI/PET target-domain data"
download:
  default_tasks: task1,task2,task3
  tool: huggingface_hub.snapshot_download
  resume: true
  requires_token: true
  token_sources:
    - HF_TOKEN
    - secrets/hf_token
  raw_destination: data/raw/huggingface
  proxy:
    direct_baseline: true
    dedicated_proxy_supported: true
    prefer_low_traffic_multiplier_nodes: true
    cleanup_dedicated_proxy_after_download: true
